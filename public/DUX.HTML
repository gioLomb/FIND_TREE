<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FIND TREE</title>
  <style>#map { height: 100vh; }</style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" type="text/css" href="style.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
   <script src="feature.js"></script>
      <script src="show_function.js"></script>

</head>
<body onload="printTreesMarkers()">
  <button type="button" onclick="playDangerAlert()">PERICOLO!!!</button>
  <!-- Overlay Loading Spinner -->
<div id="loading-overlay">
  <div class="spinner"></div>
    <div class="loading-text">Attendi...</div>

</div>

  <div id="map"></div>

   
  <script>
    
    const map = L.map('map').setView([41.1642, 16.2105], 16);
//aggiungi foto mappa come layer
   L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: 'Tiles © Esri'
}).addTo(map);

 

  let userMarker = null;

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition( //ottiene continuamente posizione e esegue callback in caso di cambiamenti
      position => {
        let lat = position.coords.latitude;
        let lng = position.coords.longitude;

        console.log(`Nuova posizione: ${lat}, ${lng}`);

        if (userMarker) {
          userMarker.setLatLng([lat, lng]);
        } else {
          userMarker = L.marker([lat, lng]).addTo(map);
        }

        map.setView([lat, lng]);
      },
      error => {
        console.error('Errore nella geolocalizzazione:', error);
      },
      {
        enableHighAccuracy: true,
        maximumAge: 0,  //evita caching
        timeout: 10000
      }
    );
  } else {
    alert("Geolocalizzazione non supportata dal browser.");
  }
  

  </script>

  <div class="container">
    <div class="form-box">
      <h1>AGGIUNGI ALBERO</h1>
      <form>
        <input type="text" id="tree" placeholder="Nome albero">
        <button type="button" onclick="addTreeWithPosition()">INVIA</button>
      </form>
    </div>

    <!-- Linea divisoria -->
    <div class="divider"></div>

    <!-- Form Raggiungi Albero -->
    <div class="form-box">
      <h1>RAGGIUNGI ALBERO</h1>
      <form>
        <select id="sel_tree">
          <script>printTreesSelect()</script>
        </select>
        <button type="button" onclick="reachTree()">RAGGIUNGI</button>
        <button type="button" onclick="deleteTree()">ELIMINA</button>

      </form>
    </div>
  </div>

</body>
</html>
